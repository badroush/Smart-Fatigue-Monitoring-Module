App\Entity\Conducteur:
    properties:
        nom:
            - NotBlank: { message: 'Le nom du conducteur est obligatoire' }
            - Length:
                min: 2
                minMessage: 'Le nom doit contenir au moins {{ limit }} caractères'
                max: 100
        numeroPermis:
            - NotBlank: { message: 'Le numéro de permis est obligatoire' }
            - Length:
                min: 5
                minMessage: 'Numéro de permis invalide'
                max: 50
            - Unique: { message: 'Ce numéro de permis est déjà utilisé' }
        telephone:
            - Regex:
                pattern: '/^\+216\s[0-9]{2}\s[0-9]{3}\s[0-9]{3}$/'
                message: 'Format de téléphone invalide (ex: +216 20 123 456)'